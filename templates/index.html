<!DOCTYPE html>
<html>
<head>
    <title>Screen Share with Resizable Crop</title>
    <style>
        /* Previous general styles remain the same */
        .crop-box {
            position: absolute;
            border: 2px solid red;
            background-color: rgba(255, 0, 0, 0.1);
            cursor: move;
        }

        .resize-handle {
            position: absolute;
            width: 10px;
            height: 10px;
            background-color: red;
            border-radius: 50%;
        }

        .resize-handle.top-left {
            top: -5px;
            left: -5px;
            cursor: nw-resize;
        }

        .resize-handle.bottom-right {
            bottom: -5px;
            right: -5px;
            cursor: se-resize;
        }

        .crop-dimensions {
            position: absolute;
            top: -25px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255, 0, 0, 0.9);
            color: white;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 12px;
            white-space: nowrap;
        }

        /* Make preview canvas responsive */
        #previewCanvas {
            max-width: 100%;
            height: auto;
        }

        .preview-pane {
            min-width: 300px;
        }
    </style>
</head>
<body>
    <!-- Previous HTML structure remains the same until crop-box -->
    <div class="crop-box">
        <div class="resize-handle top-left"></div>
        <div class="resize-handle bottom-right"></div>
        <div class="crop-dimensions"></div>
    </div>

    <script>
        let stream = null;
        let trueWidth = 0;
        let trueHeight = 0;
        let isResizing = false;
        let currentHandle = null;
        let cropWidth = 512;
        let cropHeight = 512;
        
        const cropDimensions = document.querySelector('.crop-dimensions');
        
        // Update dimensions display
        function updateCropDimensions() {
            const bounds = sharedScreen.getBoundingClientRect();
            const scale = trueWidth / bounds.width;
            const trueCropWidth = Math.round(cropWidth * scale);
            const trueCropHeight = Math.round(cropHeight * scale);
            cropDimensions.textContent = `${trueCropWidth}x${trueCropHeight} px`;
            
            // Also update the preview canvas size
            previewCanvas.width = trueCropWidth;
            previewCanvas.height = trueCropHeight;
        }

        // Initialize resize handles
        document.querySelectorAll('.resize-handle').forEach(handle => {
            handle.addEventListener('mousedown', (e) => {
                e.stopPropagation(); // Prevent dragging when resizing
                isResizing = true;
                currentHandle = handle;
                initialX = e.clientX;
                initialY = e.clientY;
            });
        });

        // Modified drag function to handle both moving and resizing
        function drag(e) {
            if (isDragging) {
                e.preventDefault();
                
                const bounds = sharedScreen.getBoundingClientRect();
                const scale = trueWidth / bounds.width;
                
                let newX = e.clientX - initialX;
                let newY = e.clientY - initialY;
                
                // Convert to true pixels and constrain
                let trueX = (currentX + newX) * scale;
                let trueY = (currentY + newY) * scale;
                
                // Constrain to video bounds
                trueX = Math.max(0, Math.min(trueX, trueWidth - (cropWidth * scale)));
                trueY = Math.max(0, Math.min(trueY, trueHeight - (cropHeight * scale)));
                
                // Convert back to display coordinates
                currentX = trueX / scale;
                currentY = trueY / scale;
                
                setTranslate(currentX, currentY, cropBox);
            } else if (isResizing && currentHandle) {
                e.preventDefault();
                
                const bounds = sharedScreen.getBoundingClientRect();
                const scale = trueWidth / bounds.width;
                const box = cropBox.getBoundingClientRect();
                
                if (currentHandle.classList.contains('top-left')) {
                    const dx = e.clientX - initialX;
                    const dy = e.clientY - initialY;
                    
                    const newWidth = box.width - dx;
                    const newHeight = box.height - dy;
                    
                    if (newWidth >= 50 && newHeight >= 50) {
                        cropWidth = newWidth;
                        cropHeight = newHeight;
                        currentX += dx;
                        currentY += dy;
                        initialX = e.clientX;
                        initialY = e.clientY;
                    }
                } else if (currentHandle.classList.contains('bottom-right')) {
                    const dx = e.clientX - initialX;
                    const dy = e.clientY - initialY;
                    
                    const newWidth = box.width + dx;
                    const newHeight = box.height + dy;
                    
                    if (newWidth >= 50 && newHeight >= 50) {
                        cropWidth = newWidth;
                        cropHeight = newHeight;
                        initialX = e.clientX;
                        initialY = e.clientY;
                    }
                }
                
                cropBox.style.width = `${cropWidth}px`;
                cropBox.style.height = `${cropHeight}px`;
                setTranslate(currentX, currentY, cropBox);
                updateCropDimensions();
            }
        }

        // Modified updatePreview function to handle variable dimensions
        function updatePreview() {
            if (!stream) return;
            
            try {
                const bounds = sharedScreen.getBoundingClientRect();
                const scale = trueWidth / bounds.width;
                
                // Calculate true pixel coordinates
                const trueX = currentX * scale;
                const trueY = currentY * scale;
                const trueCropWidth = cropWidth * scale;
                const trueCropHeight = cropHeight * scale;
                
                ctx.drawImage(
                    sharedScreen,
                    trueX,
                    trueY,
                    trueCropWidth,
                    trueCropHeight,
                    0,
                    0,
                    previewCanvas.width,
                    previewCanvas.height
                );
                
                requestAnimationFrame(updatePreview);
            } catch (error) {
                console.error('Error in updatePreview:', error);
            }
        }

        // Modified startScreenShare function
        async function startScreenShare() {
            updateStatus('Requesting screen share permissions...');
            try {
                if (!navigator.mediaDevices || !navigator.mediaDevices.getDisplayMedia) {
                    throw new Error('Screen sharing is not supported in this browser');
                }

                stream = await navigator.mediaDevices.getDisplayMedia({
                    video: {
                        cursor: "always",
                        displaySurface: "monitor",
                    },
                    audio: false
                });
                
                sharedScreen.srcObject = stream;
                
                // Wait for video metadata to load
                await new Promise(resolve => {
                    sharedScreen.onloadedmetadata = () => {
                        trueWidth = sharedScreen.videoWidth;
                        trueHeight = sharedScreen.videoHeight;
                        resolve();
                    };
                });

                await sharedScreen.play();
                
                updateStatus('Screen share active - Drag corners to resize, drag center to move');
                updateDimensions();
                
                // Set initial crop box size and position
                const bounds = sharedScreen.getBoundingClientRect();
                const scale = trueWidth / bounds.width;
                cropWidth = 512 / scale;
                cropHeight = 512 / scale;
                cropBox.style.width = `${cropWidth}px`;
                cropBox.style.height = `${cropHeight}px`;
                
                sharedScreen.style.display = 'block';
                cropOverlay.style.display = 'block';
                shareButton.style.display = 'none';
                stopButton.style.display = 'inline-block';
                
                // Set initial position
                currentX = (bounds.width - cropWidth) / 2;
                currentY = (bounds.height - cropHeight) / 2;
                setTranslate(currentX, currentY, cropBox);
                
                updateCropDimensions();
                
                stream.getVideoTracks()[0].addEventListener('ended', () => {
                    updateStatus('Screen share stopped by user');
                    stopSharing();
                });
                
                requestAnimationFrame(updatePreview);
                
            } catch (err) {
                updateStatus(`Error: ${err.message}`);
                console.error("Screen share error:", err);
                stopSharing();
            }
        }

        document.addEventListener('mouseup', () => {
            isDragging = false;
            isResizing = false;
            currentHandle = null;
        });
    </script>
</body>
</html>
